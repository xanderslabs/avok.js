name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm CLI for OIDC publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r --filter "./packages/*" build

      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # First-publish auth for brand-new package names: a granular npm
          # automation token (set the NPM_TOKEN repo secret). setup-node already
          # wrote an .npmrc that reads NODE_AUTH_TOKEN. Provenance attestation
          # still rides on OIDC (id-token: write above). Once the packages exist
          # and a trusted publisher is configured you can drop NODE_AUTH_TOKEN to
          # go pure-OIDC.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
