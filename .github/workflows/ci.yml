name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Formatting and dead code, enforced. bb04250 added biome but gated nothing, so both
      # could drift in unnoticed. Runs before the build because it takes milliseconds and a
      # style or unused-symbol failure should not wait on a full compile to surface.
      # `lint` carries --error-on-warnings: the three rules are `warn` by design, and plain
      # `biome lint` exits 0 on warnings, which would make this step decorative.
      - run: pnpm format:check && pnpm lint

      - run: pnpm -r --filter "./packages/*" --filter "./contracts" --filter "./design" build

      - run: pnpm -r --filter "./packages/*" --filter "./design" test

      - run: pnpm --filter @avokjs/contracts test:ts

  # Solidity custody contracts (EIP-7702 wallet account).
  # The `build` job only runs contracts `test:ts`; the Foundry suite must run
  # too so on-chain custody logic cannot regress undetected.
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # @openzeppelin/contracts is a pnpm dep and is remapped into the Foundry
      # build (foundry.toml libs = ["node_modules", "lib"]).
      - run: pnpm install --frozen-lockfile

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: forge test --offline --disable-labels
        working-directory: contracts
