<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    /* 1200x630 social card. Fixed dark look (social images render on their own). */
    * { box-sizing: border-box; margin: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #18181B;
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 88px 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .brand { display: flex; align-items: center; gap: 20px; }
    .mark { width: 46px; height: 46px; }
    .name { font-weight: 700; font-size: 40px; letter-spacing: -0.02em; }
    .tag {
      font-weight: 700;
      font-size: 62px;
      line-height: 1.1;
      letter-spacing: -0.03em;
      max-width: 20ch;
      color: #FAFAFA;
    }
    .tag .accent { color: #7AA2FF; }
    .foot {
      font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 22px;
      color: #A1A1AA;
      letter-spacing: 0.02em;
    }
    .glow {
      position: absolute;
      right: -160px;
      top: -160px;
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(122, 162, 255, 0.16), transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="brand">
    <svg class="mark" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <rect width="24" height="24" rx="5.5" fill="#FAFAFA" />
      <rect x="7" y="7" width="10" height="10" rx="2.6" transform="rotate(45 12 12)" fill="#18181B" />
    </svg>
    <span class="name">Avok</span>
  </div>

  <div class="tag">Self-custodial smart-EOA wallets, powered by <span class="accent">passkeys</span> and EIP-7702.</div>

  <div class="foot">avok.js&nbsp;&nbsp;·&nbsp;&nbsp;EVM &amp; Solana&nbsp;&nbsp;·&nbsp;&nbsp;no seed phrase&nbsp;&nbsp;·&nbsp;&nbsp;MIT</div>
</body>
</html>
